<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="821px" height="381px" viewBox="-0.5 -0.5 821 381" style="background-color: transparent;">
  <!-- Styled boxes for the modular RNA-seq pipeline architecture -->
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Group: Preprocessing -->
  <g filter="url(#shadow)">
    <rect x="10" y="160" width="110" height="50" rx="8" ry="8" fill="#f8f9fa" stroke="#6c757d" stroke-width="2"/>
    <text x="65" y="190" fill="#212529" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Raw FASTQ</text>
  </g>

  <!-- Connectors -->
  <path d="M 120 185 L 150 185" fill="none" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="150" y="160" width="110" height="50" rx="8" ry="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
    <text x="205" y="185" fill="#1a73e8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">fastp</text>
    <text x="205" y="200" fill="#1a73e8" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">(Trim &amp; Filter)</text>
  </g>

  <path d="M 260 185 L 290 185" fill="none" stroke="#6c757d" stroke-width="2"/>

  <!-- Alignment -->
  <g filter="url(#shadow)">
    <rect x="290" y="160" width="110" height="50" rx="8" ry="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
    <text x="345" y="185" fill="#1a73e8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">STAR</text>
    <text x="345" y="200" fill="#1a73e8" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">(Alignment)</text>
  </g>

  <path d="M 400 185 L 430 185" fill="none" stroke="#6c757d" stroke-width="2"/>

  <!-- Sort -->
  <g filter="url(#shadow)">
    <rect x="430" y="160" width="110" height="50" rx="8" ry="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
    <text x="485" y="190" fill="#1a73e8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">samtools sort</text>
  </g>

  <path d="M 540 185 L 570 185" fill="none" stroke="#6c757d" stroke-width="2"/>

  <!-- Mark Duplicates -->
  <g filter="url(#shadow)">
    <rect x="570" y="160" width="110" height="50" rx="8" ry="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
    <text x="625" y="185" fill="#1a73e8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Picard</text>
    <text x="625" y="200" fill="#1a73e8" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">MarkDuplicates</text>
  </g>

  <path d="M 680 185 L 710 185" fill="none" stroke="#6c757d" stroke-width="2"/>

  <!-- Index -->
  <g filter="url(#shadow)">
    <rect x="710" y="160" width="100" height="50" rx="8" ry="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
    <text x="760" y="190" fill="#1a73e8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">samtools index</text>
  </g>

  <!-- QC & Complexity (Top row) -->
  <path d="M 205 160 L 205 100" fill="none" stroke="#e0a800" stroke-width="1.5" stroke-dasharray="4,4"/>
  <g filter="url(#shadow)">
    <rect x="150" y="50" width="110" height="50" rx="8" ry="8" fill="#fff9e6" stroke="#e0a800" stroke-width="2"/>
    <text x="205" y="80" fill="#b58100" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">FastQC</text>
  </g>

  <path d="M 625 160 L 625 100" fill="none" stroke="#e0a800" stroke-width="1.5" stroke-dasharray="4,4"/>
  <g filter="url(#shadow)">
    <rect x="570" y="50" width="110" height="50" rx="8" ry="8" fill="#fff9e6" stroke="#e0a800" stroke-width="2"/>
    <text x="625" y="75" fill="#b58100" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Preseq</text>
    <text x="625" y="90" fill="#b58100" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">(Complexity)</text>
  </g>

  <path d="M 760 160 L 760 100" fill="none" stroke="#e0a800" stroke-width="1.5" stroke-dasharray="4,4"/>
  <g filter="url(#shadow)">
    <rect x="710" y="50" width="100" height="50" rx="8" ry="8" fill="#fff9e6" stroke="#e0a800" stroke-width="2"/>
    <text x="760" y="75" fill="#b58100" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">RSeQC</text>
    <text x="760" y="90" fill="#b58100" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">(Strandedness)</text>
  </g>

  <!-- Quantification (Bottom row) -->
  <path d="M 760 210 L 760 270" fill="none" stroke="#28a745" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="710" y="270" width="100" height="50" rx="8" ry="8" fill="#eafaf1" stroke="#28a745" stroke-width="2"/>
    <text x="760" y="295" fill="#1e7e34" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">featureCounts</text>
    <text x="760" y="310" fill="#1e7e34" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">(Quantification)</text>
  </g>

  <!-- Analytics -->
  <path d="M 710 295 L 680 295" fill="none" stroke="#28a745" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="570" y="270" width="110" height="50" rx="8" ry="8" fill="#eafaf1" stroke="#28a745" stroke-width="2"/>
    <text x="625" y="295" fill="#1e7e34" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">normalize.py</text>
    <text x="625" y="310" fill="#1e7e34" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">(TPM / FPKM)</text>
  </g>

  <path d="M 570 295 L 540 295" fill="none" stroke="#28a745" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="430" y="270" width="110" height="50" rx="8" ry="8" fill="#eafaf1" stroke="#28a745" stroke-width="2"/>
    <text x="485" y="295" fill="#1e7e34" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">deseq2_prep.py</text>
    <text x="485" y="310" fill="#1e7e34" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">(VST / PCA)</text>
  </g>

  <!-- MultiQC (Aggregated reporting) -->
  <g filter="url(#shadow)">
    <rect x="320" y="50" width="110" height="50" rx="8" ry="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="375" y="80" fill="#7b1fa2" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">MultiQC</text>
  </g>

  <!-- Connectors to MultiQC -->
  <path d="M 260 75 L 320 75" fill="none" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="3,3"/>
  <path d="M 375 160 L 375 100" fill="none" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Arrow marker definition -->
  <markers>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#6c757d"/>
    </marker>
  </markers>
</svg>
