name: Snakemake Pipeline Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install "snakemake>=8.0,<9.0" "pyyaml" "pulp>=2.0,<2.8"

      - name: Install Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: 'latest'

      - name: Install STAR Aligner
        run: |
          sudo apt-get update && sudo apt-get install -y rna-star

      - name: Generate Synthetic Data
        run: |
          python3 rules/scripts/generate_test_data.py --mode pe

      - name: Cache Conda Environments
        uses: actions/cache@v3
        with:
          path: .snakemake/conda
          key: snakemake-conda-${{ runner.os }}-${{ hashFiles('rules/envs/**/*.yaml') }}
          restore-keys: |
            snakemake-conda-${{ runner.os }}-

      - name: Run Pipeline (CI Mode)
        run: |
          snakemake --use-conda --conda-frontend mamba --profile profiles/test \
            --cores 4 \
            --latency-wait 60

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-pe
          path: |
            results/
            logs/
          retention-days: 7

  test-se:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install "snakemake>=8.0,<9.0" "pyyaml" "pulp>=2.0,<2.8"

      - name: Install Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: 'latest'

      - name: Install STAR Aligner
        run: |
          sudo apt-get update && sudo apt-get install -y rna-star

      - name: Generate Synthetic Data
        run: |
          python3 rules/scripts/generate_test_data.py --mode se

      - name: Cache Conda Environments
        uses: actions/cache@v3
        with:
          path: .snakemake/conda
          key: snakemake-conda-${{ runner.os }}-${{ hashFiles('rules/envs/**/*.yaml') }}
          restore-keys: |
            snakemake-conda-${{ runner.os }}-

      - name: Run Pipeline (CI Mode - Single-End)
        run: |
          snakemake --use-conda --conda-frontend mamba --profile profiles/test \
            --configfile profiles/test/config_se.yaml \
            --cores 4 \
            --latency-wait 60

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-se
          path: |
            results/
            logs/
          retention-days: 7

  test-singularity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install "snakemake>=8.0,<9.0" "pyyaml" "pulp>=2.0,<2.8"

      - name: Install Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: 'latest'

      - name: Setup Apptainer
        uses: eWaterCycle/setup-apptainer@v2

      - name: Install STAR Aligner
        run: |
          sudo apt-get update && sudo apt-get install -y rna-star

      - name: Generate Synthetic Data
        run: |
          python3 rules/scripts/generate_test_data.py --mode pe

      - name: Run Pipeline (CI Mode - Singularity)
        run: |
          snakemake --use-singularity --profile profiles/test \
            --cores 4 \
            --latency-wait 60

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-singularity
          path: |
            results/
            logs/
          retention-days: 7

