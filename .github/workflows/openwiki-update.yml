name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *" # Runs daily at 08:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenWiki
        run: npm install --global openwiki

      - name: Run OpenWiki Init/Update
        run: |
          # If the openwiki/ directory doesn't exist, initialize it; otherwise, update it.
          if [ ! -d "openwiki" ]; then
            openwiki --init -p "Initialize OpenWiki documentation for RNA-seq pipeline"
          else
            openwiki --update -p "Update OpenWiki documentation with recent changes"
          fi
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENWIKI_MODEL_ID: z-ai/glm-5.2
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            openwiki
            AGENTS.md
          branch: openwiki/update
          commit-message: "docs: update OpenWiki documentation"
          title: "docs: update OpenWiki"
          body: "Automated daily update generated by OpenWiki to keep codebase documentation fresh for coding agents."
