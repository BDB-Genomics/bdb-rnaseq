name: Snakemake Pipeline Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install "snakemake>=8.0,<9.0" "pyyaml" "pulp>=2.0,<2.8" "pytest"

      - name: Install Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: 'latest'

      - name: Install STAR Aligner
        run: |
          sudo apt-get update && sudo apt-get install -y rna-star

      - name: Generate Test Data
        run: |
          python3 rules/scripts/generate_test_data.py

      - name: Cache Conda Environments
        uses: actions/cache@v3
        with:
          path: .snakemake/conda
          key: snakemake-conda-${{ runner.os }}-${{ hashFiles('rules/envs/**/*.yaml') }}
          restore-keys: |
            snakemake-conda-${{ runner.os }}-

      - name: Lint Workflow
        run: |
          snakemake --lint

      - name: Run Config Validation Tests
        run: |
          pytest rules/scripts/test_validate_config.py

      - name: Validate Workflow (Dry-run)
        run: |
          snakemake -n --use-conda --conda-frontend mamba --profile profiles/test

  test:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install "snakemake>=8.0,<9.0" "pyyaml" "pulp>=2.0,<2.8"

      - name: Install Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: 'latest'

      - name: Install STAR Aligner
        run: |
          sudo apt-get update && sudo apt-get install -y rna-star

      - name: Generate Test Data
        run: |
          python3 rules/scripts/generate_test_data.py

      - name: Cache Conda Environments
        uses: actions/cache@v3
        with:
          path: .snakemake/conda
          key: snakemake-conda-${{ runner.os }}-${{ hashFiles('rules/envs/**/*.yaml') }}
          restore-keys: |
            snakemake-conda-${{ runner.os }}-

      - name: Run Pipeline (Test Mode)
        run: |
          snakemake --use-conda --conda-frontend mamba --profile profiles/test \
            --cores 4 \
            --latency-wait 60

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            results/
            logs/
          retention-days: 7
