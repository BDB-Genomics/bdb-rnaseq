# Snakemake Local Profile
# Usage: snakemake --profile profile/local

use-conda: true
jobs: 8
printshellcmds: true
show-failed-logs: true
keep-going: true
rerun-incomplete: true
restart-times: 0

# These are fallbacks ONLY. If a rule has its own resources (like yours do),
# these values will be ignored for that rule.
default-resources:
  mem_mb: 4000
  time: 60
  threads: 1
